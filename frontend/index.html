<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SceneFlow</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app">
    <div class="container">
        <header>
            <h1>SceneFlow</h1>
        </header>
        <main>
            <div class="status-bar">
                Status: <span x-text="status"></span>
            </div>

            <div class="layout">
                <!-- Video Preview Section -->
                <div class="preview-section" x-show="selectedClip">
                    <div class="video-container">
                        <video 
                            x-ref="player" 
                            :src="selectedClip ? 'http://localhost:8000/proxy/' + selectedClip.id : ''" 
                            controls 
                            autoplay
                        ></video>
                        <!-- Visual markers overlay -->
                        <div class="markers-overlay" x-show="markers.length > 0">
                            <template x-for="marker in markers" :key="marker.id">
                                <div 
                                    class="marker-indicator"
                                    :style="getMarkerPosition(marker)"
                                    @click="seekTo(marker.timestamp)"
                                    title="Marker: " + formatTime(marker.timestamp) + (marker.note ? ' - ' + marker.note : '')
                                ></div>
                            </template>
                        </div>
                    </div>
                    <div class="player-controls" x-show="selectedClip">
                        <button @click="addMarker()">Add Marker</button>
                        <!-- Hidden input for marker note (for Electron compatibility) -->
                        <input type="text" x-ref="markerNoteInput" class="hidden-input" style="display: none;">
                    </div>
                    <div class="markers-panel" x-show="selectedClip">
                        <h4 style="display: flex; justify-content: space-between; align-items: center;">
                            <span>Markers</span>
                            <span class="badge badge-info" x-text="markers.length + ' total'"></span>
                        </h4>
                        <ul class="marker-list" x-show="markers.length > 0">
                            <template x-for="marker in markers" :key="marker.id">
                                <li>
                                    <span @click="seekTo(marker.timestamp)" x-text="formatTime(marker.timestamp)"></span>
                                    <span class="marker-note" x-text="marker.note"></span>
                                    <button @click="removeMarker(marker.id)" class="btn-delete">&times;</button>
                                </li>
                            </template>
                        </ul>
                        <p x-show="markers.length === 0" style="font-size: 0.8em; color: #999; text-align: center;">No markers yet.</p>
                    </div>
                </div>

                <!-- Sidebar/List Section -->
                <div class="sidebar-section">
                    <div class="controls">
                <input type="text" x-model="scanPath" placeholder="Enter media directory path...">
                <button @click="scanDirectory()">Scan Directory</button>
            </div>
            <div class="content">
                <h3>Discovered Clips</h3>
<ul class="clip-list">
    <template x-for="clip in clips" :key="clip.id">
        <li @click="selectClip(clip)" :class="{ 'is-kept': clip.is_kept, 'is-processing': proxyStatuses[clip.id] === 'generating', 'is-selected': selectedClip && selectedClip.id === clip.id }">
            <div class="clip-main">
                                <div class="clip-info">
                                    <span class="file-name" x-text="clip.file_name"></span> 
                                    <span class="resolution" x-text="'(' + clip.resolution + ')'"></span>
                                </div>
                                <div class="clip-tags" x-show="clip.tags && clip.tags.length > 0">
                                    <template x-for="tag in clip.tags" :key="tag.id">
                                        <span class="tag-pill" x-text="tag.value"></span>
                                    </template>
                                </div>
                            </div>

                            <div class="clip-actions">
                                <button @click="toggleKeep(clip.id, clip.is_kept)" 
                                        :class="clip.is_kept ? 'btn-keep active' : 'btn-keep'">
                                    <span x-text="clip.is_kept ? '✓ Kept' : 'Keep'"></span>
                                </button>

                                <div class="tag-input-group" x-show="showTagInput === clip.id" @click.away="showTagInput = null">
                                    <input type="text" x-model="newTagName" @keyup.enter="addTag(clip.id, 'creative', newTagName); showTagInput = null" placeholder="Add tag...">
                                </div>
                                <button @click="showTagInput = clip.id" class="btn-icon">+</button>
                            </div>

                            <div class="clip-status">
                                <template x-if="proxyStatuses[clip.id] === 'generating'">
                                    <span class="badge badge-info">Generating proxy...</span>
                                </template>
                                <template x-if="proxyStatuses[clip.id] === 'completed'">
                                    <span class="badge badge-success">Proxy ready</span>
                                </template>
                                <template x-if="proxyStatuses[clip.id] === 'failed'">
                                    <span class="badge badge-error">Proxy failed</span>
                                </template>
                            </div>
                        </li>
                    </template>
                </ul>
                <p x-show="clips.length === 0">No clips discovered yet.</p>
            </div>

            <div class="content" style="margin-top: 20px;">
                <h3>Sequences</h3>
                <div class="controls">
                    <button @click="createSequenceFromKept()">Create Sequence from Kept Clips</button>
                </div>
                <ul class="sequence-list">
                    <template x-for="seq in sequences" :key="seq.id">
                        <li>
                            <span x-text="seq.name"></span>
                            <button @click="exportStoryboard(seq.id)" class="btn-secondary">Export Markdown</button>
                        </li>
                    </template>
                </ul>
                <p x-show="sequences.length === 0">No sequences created yet.</p>
            </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
